name: Release

on:
    release:
        types:
          - published

permissions: read-all

concurrency:
    group: release-${{ github.event.release.tag_name }}
    cancel-in-progress: true

jobs:
    Build:
        permissions:
            contents: write
        strategy:
            matrix:
                architecture:
                  - "386"
                  - "amd64"
                  - "arm64"
                os:
                  - linux
                  - windows
                  - darwin
                exclude:
                  - os: darwin
                    architecture: 386
                include:
                  - os: linux
                    runner: ubuntu-latest
                  - os: windows
                    runner: windows-latest
                  - os: darwin
                    runner: macos-latest
        runs-on: ${{ matrix.runner }}
        steps:
          - name: Harden Runner
            uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
            with:
                egress-policy: audit

          - name: Checkout
            uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            with:
                fetch-depth: 1

          - name: Install Go
            uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
            with:
                go-version-file: go.mod

          - name: Install nfpm
            if: matrix.os == 'linux'
            run: |
                go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.43.0
                echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

          - name: Build
            env:
                CGO_ENABLED: "0"
                GOOS: ${{matrix.os}}
                GOARCH: ${{matrix.architecture}}
            run: |
                go version
                make

          - name: Gather Third Party License Information
            env:
                CGO_ENABLED: "0"
                GOOS: ${{matrix.os}}
                GOARCH: ${{matrix.architecture}}
            run: |
                make third_party_licenses-${{ matrix.os }}-${{ matrix.architecture }}-dir \
                     third_party_licenses-${{ matrix.os }}-${{ matrix.architecture }}.tar.xz

          - name: Upload Executable Artifacts
            if: matrix.os == 'linux'
            uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
            with:
                name: sonicweb-${{ matrix.os }}-${{ matrix.architecture }}
                path: |
                    sonicweb-${{ matrix.os }}-${{ matrix.architecture }}
                compression-level: '9'
                retention-days: 2

          - name: Upload Third Party License Artifacts
            if: matrix.os == 'linux'
            uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
            with:
                name: third_party_licenses-${{ matrix.os }}-${{ matrix.architecture }}
                path: |
                    third_party_licenses-${{ matrix.os }}-${{ matrix.architecture }}.tar.xz
                compression-level: '1'
                retention-days: 2

          - name: Build Package
            if: matrix.os == 'linux'
            env:
                CGO_ENABLED: "0"
                GOOS: ${{matrix.os}}
                GOARCH: ${{matrix.architecture}}
            run: make package

          - name: Compress xz
            if: matrix.os != 'windows'
            run: |
                  tar -cf - sonicweb-${{ matrix.os }}-${{ matrix.architecture }}                    \
                            third_party_licenses-${{ matrix.os }}-${{ matrix.architecture }}.tar.xz \
                | xz -T0 -9 > sonicweb-${{ matrix.os }}-${{ matrix.architecture }}.tar.xz

          - name: Compress 7z (Windows)
            if: matrix.os == 'windows'
            shell: powershell
            run: |
                $sevenZip = "C:\Program Files\7-Zip\7z.exe"
                if (-Not (Test-Path $sevenZip)) { throw "7-Zip not found at $sevenZip" }
                & $sevenZip a -t7z -ssw -mmt=on -mx=9 "sonicweb-${{ matrix.os }}-${{ matrix.architecture }}.7z" `
                    "sonicweb-${{ matrix.os }}-${{ matrix.architecture }}.exe" `
                    "third_party_licenses-${{ matrix.os }}-${{ matrix.architecture }}.tar.xz"

          - name: Upload Non-Windows Release (via GitHub CLI)
            if: matrix.os != 'windows'
            env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                TAG_NAME: ${{ github.event.release.tag_name }}
            shell: bash
            run: |
                shopt -s nullglob
                for file in sonicweb-*-*.tar.xz SonicWeb*.rpm SonicWeb*.deb
                do
                    gh release upload "$TAG_NAME" "$file" --clobber
                done

          - name: Upload Windows Release (via GitHub CLI)
            if: matrix.os == 'windows'
            shell: powershell
            env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                TAG_NAME: ${{ github.event.release.tag_name }}
            run: |
                Set-StrictMode -Version Latest
                $ErrorActionPreference = 'Stop'
                Get-ChildItem -File -Path . -Filter 'sonicweb-*-*.7z' | ForEach-Object {
                    gh release upload $env:TAG_NAME $_.FullName --clobber
                }

    BuildDockerMultiArch:
        permissions:
            packages: write
        runs-on: ubuntu-latest
        needs: Build
        outputs:
            digest: ${{ steps.docker_build.outputs.digest }}
            imageName: ${{ steps.vars.outputs.IMAGE_NAME}}
        steps:
          - name: Harden Runner
            uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
            with:
                egress-policy: audit

          - name: Generate Variables
            id: vars
            shell: bash
            run: |
                echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
                echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

          - name: Checkout
            uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            with:
                fetch-depth: 1

          - name: Set up QEMU
            uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

          - name: Set up Docker Buildx
            uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

          - name: Login to GHCR
            uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
            with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

          - name: Download Artifacts
            uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
            with:
                pattern: sonicweb-linux-*
                merge-multiple: true
                path: .

          - name: Download Third Party Licenses Artifacts
            uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
            with:
                pattern: third_party_licenses-linux-*
                merge-multiple: true
                path: .

          - name: Build Docker Image
            id: docker_build
            uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
            with:
                context: .
                platforms: linux/amd64,linux/arm64
                pull: true
                push: true
                cache-from: type=gha
                cache-to: type=gha,mode=max
                build-args: |
                    VERSION=${{ github.event.release.tag_name }}
                    REVISION=${{ github.sha }}
                    CREATED=${{ github.event.release.created_at }}
                tags: |
                    ${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }}
                    ${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }}-${{ github.sha }}
                    ${{ env.IMAGE_NAME }}:latest

          - name: Inspect final manifests
            env:
                TAG_NAME: ${{ github.event.release.tag_name }}
            run: |
                set -euo pipefail
                docker manifest inspect "${IMAGE_NAME}:${TAG_NAME}"
                docker manifest inspect "${IMAGE_NAME}:${TAG_NAME}-${{ github.sha }}"
                docker manifest inspect "${IMAGE_NAME}:latest"

    ChecksumReleaseAssets:
        needs: Build
        runs-on: ubuntu-latest
        name: Checksum Release Assets
        outputs:
            hashBase64File: ${{ steps.hashes.outputs.handle }}
        steps:
          - name: Harden Runner
            uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
            with:
                egress-policy: audit

          - name: Checkout
            uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            with:
                fetch-depth: 1

          - name: Download all release assets via GitHub CLI
            env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                TAG_NAME: ${{ github.event.release.tag_name }}
            run: |
                set -euo pipefail
                mkdir -p release-assets
                cd release-assets
                # gets all assets of the release
                gh release download "$TAG_NAME" --clobber
                echo "Downloaded assets:"
                ls -lah

          - name: Generate Checksums
            working-directory: release-assets
            run: |
                set -euo pipefail
                # Robustly hash all regular files in this directory, then base64 and write via tee.
                LC_ALL=C find . -maxdepth 1 -type f -printf '%P\0' \
                  | sort -z \
                  | xargs -0 sha256sum -- \
                  | base64 -w0 \
                  | tee check.sha256 > /dev/null
          - name: Upload Checksums
            id: hashes
            uses: slsa-framework/slsa-github-generator/actions/generator/generic/create-base64-subjects-from-file@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # 2.1.0
            with:
                path: release-assets/check.sha256

    ContainerProvenance:
        permissions:
            actions:  read  # for detecting the GitHub Actions environment.
            id-token: write # for creating OIDC tokens for signing.
            packages: write # for uploading attestations.
        needs:
          - BuildDockerMultiArch
        name: Container Provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0 #must have semver!
        with:
            image:             ${{ needs.BuildDockerMultiArch.outputs.imageName }}:${{ github.event.release.tag_name }}
            digest:            ${{ needs.BuildDockerMultiArch.outputs.digest }}
            registry-username: ${{ github.actor }}
        secrets:
            registry-password: ${{ secrets.GITHUB_TOKEN }}

    ContainerProvenanceImmutable:
        permissions:
            actions:  read
            id-token: write
            packages: write
        needs:
            - BuildDockerMultiArch
        name: Container Provenance (immutable tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0 #must have semver!
        with:
            # same manifest digest, but referenced via the immutable tag
            image:             ${{ needs.BuildDockerMultiArch.outputs.imageName }}:${{ github.event.release.tag_name }}-${{ github.sha }}
            digest:            ${{ needs.BuildDockerMultiArch.outputs.digest }}
            registry-username: ${{ github.actor }}
        secrets:
            registry-password: ${{ secrets.GITHUB_TOKEN }}

    AssetProvenance:
        permissions:
            actions:  read  # Needed for detection of GitHub Actions environment.
            id-token: write # Needed for provenance signing and ID
            contents: write # Needed for release uploads
        needs: ChecksumReleaseAssets
        uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0 #must have semver!
        with:
            base64-subjects-as-file: "${{ needs.ChecksumReleaseAssets.outputs.hashBase64File }}"
            upload-assets: true
            upload-tag-name: "${{ github.event.release.tag_name }}"
